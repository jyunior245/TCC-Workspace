services:
  flask-app:
    build: .
    container_name: flask_app_tcc
    ports:
      - "5000:5000"
    volumes:
      - ./Flask:/app
      - ./oauth-client-key.json:/app/oauth-client-key.json
      - ./firebase-key.json:/app/firebase-key.json
      - chroma_data:/app/app/data/vector_db
    env_file:
      - .env
    environment:
      - RUNNING_IN_DOCKER=true
      - OLLAMA_URL=http://host.docker.internal:11434/api/generate
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST}:5432/${DATABASE_NAME}
    depends_on:
      - db
    extra_hosts:
      - "host.docker.internal:host-gateway"

  #ollama:
  #  image: ollama/ollama:latest
  #  deploy:
  #    resources:
  #      reservations:
  #        devices:
  #          - driver: nvidia
  #
  #            count: 1
  #            capabilities: [gpu]
  #  container_name: ollama_tcc
  #  ports:
  #    - "11434:11434"
  #  volumes:
  #    - ollama_data:/root/.ollama

  db:
    image: postgres:13
    container_name: flask_postgres
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${DATABASE_NAME}
      - HOST=${DB_HOST}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -h ${DB_HOST} -p 5432 -d ${DATABASE_NAME} "]
      interval: 10s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data
  
