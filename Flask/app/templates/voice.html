<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Agente de Saúde por Voz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/voice.css') }}">
</head>
<body>
  <h1>Agente de Saúde por Voz</h1>

  <div class="row">
    <button id="recordBtn">🎤 Falar</button>
    <span id="status" class="muted">Pronto</span>
  </div>

  <div class="row">
    <label>Sua pergunta</label>
    <textarea id="inputText" placeholder="Fale ou digite sua dúvida..."></textarea>
    <button id="sendBtn">Enviar</button>
  </div>

  <div class="row">
    <label>Resposta</label>
    <div id="responseBox" class="resp"></div>
  </div>

  <script src="{{ url_for('static', filename='js/voice.js') }}"></script>
</body>
</html>
