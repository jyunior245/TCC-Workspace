{% extends "base.html" %}

{% block title %}Cadastro Complementar - ACS{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-page-container">
    <!-- DNA Helix + Vital Sign Background (Exclusive to Register) -->
    <div class="register-exclusive-bg">
        <div class="dna-container">
            <svg class="dna-strand" viewBox="0 0 2000 300" preserveAspectRatio="none">
                <defs>
                    <pattern id="dna-pattern" x="0" y="0" width="250" height="300" patternUnits="userSpaceOnUse">
                        <!-- Rungs connecting strands -->
                        <line x1="125" y1="50" x2="125" y2="250" class="dna-rung" />
                        <line x1="62" y1="100" x2="62" y2="200" class="dna-rung" />
                        <line x1="187" y1="100" x2="187" y2="200" class="dna-rung" />
                    </pattern>
                </defs>
                <!-- Double Helix Paths - Extended for seamlessness -->
                <path class="dna-path dna-1" d="M0,150 C100,50 150,50 250,150 C350,250 400,250 500,150 C600,50 650,50 750,150 C850,250 900,250 1000,150 L2000,150" />
                <path class="dna-path dna-2" d="M0,150 C100,250 150,250 250,150 C350,50 400,50 500,150 C600,250 650,250 750,150 C850,50 900,50 1000,150 L2000,150" />
                
                <!-- Repeat paths to fill width -->
                <path class="dna-path dna-1" d="M1000,150 C1100,50 1150,50 1250,150 C1350,250 1400,250 1500,150 C1600,50 1650,50 1750,150 C1850,250 1900,250 2000,150" />
                <path class="dna-path dna-2" d="M1000,150 C1100,250 1150,250 1250,150 C1350,50 1400,50 1500,150 C1600,250 1650,250 1750,150 C1850,50 1900,50 2000,150" />
                
                <!-- Explicit Connectors (Rungs) -->
                <g class="dna-rungs">
                    <line x1="125" y1="55" x2="125" y2="245" class="dna-rung" />
                    <line x1="375" y1="55" x2="375" y2="245" class="dna-rung" />
                    <line x1="625" y1="55" x2="625" y2="245" class="dna-rung" />
                    <line x1="875" y1="55" x2="875" y2="245" class="dna-rung" />
                    <line x1="1125" y1="55" x2="1125" y2="245" class="dna-rung" />
                    <line x1="1375" y1="55" x2="1375" y2="245" class="dna-rung" />
                    <line x1="1625" y1="55" x2="1625" y2="245" class="dna-rung" />
                    <line x1="1875" y1="55" x2="1875" y2="245" class="dna-rung" />
                </g>
            </svg>
        </div>

        <div class="molecular-nodes">
            <div class="molecule" style="top: 20%; left: 15%;"></div>
            <div class="molecule" style="top: 60%; left: 80%; animation-delay: -5s;"></div>
            <div class="molecule" style="top: 10%; right: 10%; animation-delay: -2s;"></div>
        </div>

        <!-- EKG Vital Sign sync with DNA -->
        <div class="ekg-container" style="top: 50%; opacity: 0.3;">
            <svg class="ekg-svg" viewBox="0 0 1000 100" preserveAspectRatio="none">
                <path class="ekg-path" d="M0,50 L200,50 L210,40 L220,60 L230,50 L240,50 L250,20 L260,80 L270,50 L500,50 L510,40 L520,60 L530,50 L700,50 L710,20 L720,80 L730,50 L1000,50" />
            </svg>
        </div>
    </div>

    <div class="health-icons-bg" style="opacity: 0.2;">
        <span class="material-icons-outlined floating-icon" style="left: 10%; color: #10b981;">science</span>
        <span class="material-icons-outlined floating-icon" style="left: 35%; color: #06b6d4;">medical_information</span>
        <span class="material-icons-outlined floating-icon" style="left: 70%; color: #10b981;">health_and_safety</span>
    </div>

    <div class="auth-card" style="max-width: 600px;">
        <div class="auth-header">
            <h2 class="headline-large">Dados Profissionais</h2>
            <p class="body-large">Informações adicionais para ACS</p>
        </div>

        <form action="/register/complete" method="POST" class="auth-form">
            <!-- Sexo -->
            <div class="md-text-field">
                <select name="gender" id="gender" required>
                    <option value="" disabled selected></option>
                    <option value="Masculino">Masculino</option>
                    <option value="Feminino">Feminino</option>
                    <option value="Outro">Outro</option>
                    <option value="Prefiro não informar">Prefiro não informar</option>
                </select>
                <label for="gender">Sexo</label>
            </div>

            <!-- Número de Telefone -->
            <div class="md-text-field">
                <input type="tel" name="phone_number" id="phone_number" placeholder=" " required>
                <label for="phone_number">Número de Telefone</label>
            </div>

            <div id="address-loading" style="display: none; margin-bottom: 8px; font-size: 14px; color: var(--md-sys-color-primary);">Buscando endereço... <span class="material-icons spin" style="font-size: 14px;">autorenew</span></div>
            
            <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
                <div class="md-text-field">
                    <input type="text" name="cep" id="cep" placeholder=" " maxlength="9" required>
                    <label for="cep">CEP</label>
                </div>
                <div class="md-text-field">
                    <select name="state" id="state" required>
                        <option value="" disabled selected>Selecione...</option>
                    </select>
                    <label for="state">UF (Estado)</label>
                </div>
            </div>

            <!-- Município -->
            <div class="md-text-field">
                <select name="municipio" id="municipio" required>
                    <option value="" disabled selected>Selecione...</option>
                </select>
                <label for="municipio">Município</label>
            </div>

            <!-- UBS Autocomplete -->
            <div class="md-text-field ubs-autocomplete-wrapper" style="position: relative;">
                <input type="text" id="ubs_search" autocomplete="off" placeholder=" " disabled
                       style="width: 100%; box-sizing: border-box;">
                <input type="hidden" name="ubs" id="ubs" required>
                <label for="ubs_search">UBS</label>
                <div id="ubs-suggestions" class="ubs-suggestions-list"></div>
            </div>

            <style>
            .ubs-suggestions-list {
                display: none;
                position: absolute;
                top: 100%;
                left: 0; right: 0;
                background: #fff;
                border: 2px solid var(--md-sys-color-primary, #6750a4);
                border-top: none;
                border-radius: 0 0 8px 8px;
                max-height: 220px;
                overflow-y: auto;
                z-index: 999;
                box-shadow: 0 8px 20px rgba(0,0,0,0.15);
                animation: sugestFade 0.15s ease;
            }
            @keyframes sugestFade {
                from { opacity: 0; transform: translateY(-4px); }
                to   { opacity: 1; transform: translateY(0); }
            }
            .ubs-suggestion-item {
                padding: 11px 16px;
                cursor: pointer;
                font-size: 14px;
                border-bottom: 1px solid rgba(0,0,0,0.05);
                transition: background 0.12s;
            }
            .ubs-suggestion-item:hover,
            .ubs-suggestion-item.active {
                background: #ede9fe;
                color: var(--md-sys-color-primary, #6750a4);
                font-weight: 500;
            }
            .ubs-suggestion-item:last-child { border-bottom: none; }
            .ubs-no-results {
                padding: 12px 16px;
                font-size: 13px;
                color: #888;
                font-style: italic;
            }
            </style>

            <!-- Microárea -->
            <div class="md-text-field">
                <input type="text" name="microarea" id="microarea" placeholder=" " required>
                <label for="microarea">Microárea</label>
            </div>

            <!-- CBO -->
            <div class="md-text-field">
                <input type="text" name="cbo" id="cbo" placeholder=" " required maxlength="7">
                <label for="cbo">CBO (Classificação Brasileira de Ocupações)</label>
                <div id="cbo-feedback" style="font-size: 13px; font-weight: 500; margin-top: 4px; display: none;"></div>
            </div>

            <!-- Simet / Código do Município -->
            <div class="md-text-field">
                <input type="text" name="simet_codigo_municipio" id="simet_codigo_municipio" placeholder=" " required readonly style="background-color: var(--md-sys-color-surface-variant); cursor: not-allowed; pointer-events: none;">
                <label for="simet_codigo_municipio">Simet / Código IBGE do Município</label>
            </div>

            <button type="submit" class="md-button filled">
                Finalizar Cadastro
            </button>
        </form>
    </div>
</div>

<script>
    // MASK FUNCTIONS
    function maskCEP(v) {
        v = v.replace(/\D/g, "");
        if (v.length > 8) v = v.substring(0, 8);
        v = v.replace(/^(\d{5})(\d)/, "$1-$2");
        return v;
    }

    function maskPhone(v) {
        v = v.replace(/\D/g, "");
        if (v.length > 11) v = v.substring(0, 11);
        if (v.length > 10) {
            v = v.replace(/^(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
        } else if (v.length > 5) {
            v = v.replace(/^(\d{2})(\d{4})(\d{0,4})/, "($1) $2-$3");
        } else if (v.length > 2) {
            v = v.replace(/^(\d{2})(\d{0,5})/, "($1) $2");
        } else {
            v = v.replace(/^(\d*)/, "($1");
        }
        return v;
    }

    function maskCBO(v) {
        v = v.replace(/\D/g, "");
        if (v.length > 6) v = v.substring(0, 6);
        v = v.replace(/^(\d{4})(\d)/, "$1-$2");
        return v;
    }

    document.getElementById('cbo').addEventListener('input', function(e) {
        e.target.value = maskCBO(e.target.value);
        const feedback = document.getElementById('cbo-feedback');
        
        if (e.target.value.length === 7) {
            // O código oficial do ACS é 5151-05
            if (e.target.value === '5151-05') {
                feedback.textContent = 'CBO Válido: Agente Comunitário de Saúde';
                feedback.style.color = '#4CAF50'; // Verde
                feedback.style.display = 'block';
            } else {
                feedback.textContent = 'CBO de ACS inválido. O correto é 5151-05.';
                feedback.style.color = '#F44336'; // Vermelho
                feedback.style.display = 'block';
            }
        } else {
            feedback.style.display = 'none';
        }
    });

    document.getElementById('phone_number').addEventListener('input', function(e) {
        e.target.value = maskPhone(e.target.value);
    });

    document.getElementById('cep').addEventListener('input', function(e) {
        e.target.value = maskCEP(e.target.value);
        const rawCep = e.target.value.replace(/\D/g, "");
        if(rawCep.length === 8) {
            lookupCEP(rawCep);
        } else {
            unlockAddressFields();
        }
    });

    // VIACEP LOOKUP
    async function lookupCEP(cep) {
        const loading = document.getElementById('address-loading');
        loading.style.display = 'block';
        try {
            const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await response.json();
            if(!data.erro) {
                // Set State and then trigger City load
                const stateSelect = document.getElementById('state');
                stateSelect.value = data.uf;
                await loadCities(data.uf);
                document.getElementById('municipio').value = data.localidade;

                // trigger change to update styling for state manually to avoid re-fetching
                document.getElementById('state').classList.add('has-value');
                document.getElementById('municipio').classList.add('has-value');
                lockAddressFields();
                
                // Set IBGE/Simet code
                if (data.ibge) {
                    const simetInput = document.getElementById('simet_codigo_municipio');
                    simetInput.value = data.ibge;
                    simetInput.focus();
                    simetInput.blur(); // To trigger label floating
                    
                    // Load UBS list using the IBGE code
                    await loadUbs(data.ibge);
                }
            }
        } catch (err) {
            console.error("CEP lookup failed", err);
        } finally {
            loading.style.display = 'none';
        }
    }

    function lockAddressFields() {
        const fields = ['state', 'municipio'];
        fields.forEach(id => {
            const el = document.getElementById(id);
            if(el) {
                el.style.pointerEvents = 'none';
                el.style.opacity = '0.7';
                el.style.background = 'var(--md-sys-color-surface-variant)';
            }
        });
    }

    function unlockAddressFields() {
        const fields = ['state', 'municipio'];
        fields.forEach(id => {
            const el = document.getElementById(id);
            if(el) {
                el.style.pointerEvents = 'auto';
                el.style.opacity = '1';
                el.style.background = 'white';
            }
        });
        
        // Reset Simet
        const simet = document.getElementById('simet_codigo_municipio');
        if(simet) simet.value = '';
        
        // Reset UBS autocomplete
        _ubsList = [];
        _ubsActiveIndex = -1;
        const search = document.getElementById('ubs_search');
        const hidden = document.getElementById('ubs');
        const sugg = document.getElementById('ubs-suggestions');
        if(search) { search.value = ''; search.disabled = true; }
        if(hidden) hidden.value = '';
        if(sugg)   sugg.style.display = 'none';
    }
    
    // UBS AUTOCOMPLETE
    let _ubsList = [];
    let _ubsActiveIndex = -1;

    async function loadUbs(ibgeCode) {
        _ubsList = [];
        _ubsActiveIndex = -1;
        const search = document.getElementById('ubs_search');
        const hidden = document.getElementById('ubs');
        const sugg   = document.getElementById('ubs-suggestions');

        search.value = '';
        search.disabled = true;
        search.placeholder = 'Carregando UBS...';
        hidden.value = '';
        sugg.style.display = 'none';

        try {
            const response = await fetch(`/api/ubs?ibge=${ibgeCode}`);
            const data = await response.json();

            if (data.ubs && data.ubs.length > 0) {
                _ubsList = data.ubs;
                search.disabled = false;
                search.placeholder = 'Digite para buscar a UBS...';
            } else {
                search.disabled = false;
                search.placeholder = 'Nenhuma UBS encontrada';
            }
        } catch (e) {
            console.error('loadUbs error', e);
            search.disabled = false;
            search.placeholder = 'Erro ao carregar UBS';
        }
    }

    function _renderSuggestions(filtered) {
        const sugg = document.getElementById('ubs-suggestions');
        _ubsActiveIndex = -1;
        if (!filtered.length) {
            sugg.innerHTML = '<div class="ubs-no-results">Nenhuma UBS encontrada</div>';
        } else {
            sugg.innerHTML = filtered.map(u =>
                `<div class="ubs-suggestion-item" data-val="${u}">${u}</div>`
            ).join('');
            sugg.querySelectorAll('.ubs-suggestion-item').forEach(item => {
                item.addEventListener('mousedown', (e) => {
                    e.preventDefault(); // prevent blur before click
                    _selectUbs(item.dataset.val);
                });
            });
        }
        sugg.style.display = 'block';
    }

    function _selectUbs(value) {
        document.getElementById('ubs_search').value = value;
        document.getElementById('ubs').value = value;
        document.getElementById('ubs-suggestions').style.display = 'none';
        _ubsActiveIndex = -1;
    }

    // IBGE API INTEGRATION
    async function loadStates() {
        const stateSelect = document.getElementById('state');
        try {
            const response = await fetch('https://servicodados.ibge.gov.br/api/v1/localidades/estados?orderBy=nome');
            const states = await response.json();
            states.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.sigla;
                opt.innerText = s.nome;
                stateSelect.appendChild(opt);
            });
        } catch (e) { console.error("Error loading states", e); }
    }

    async function loadCities(uf) {
        const citySelect = document.getElementById('municipio');
        citySelect.innerHTML = '<option value="" disabled selected>Carregando...</option>';
        try {
            const response = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios?orderBy=nome`);
            const cities = await response.json();
            citySelect.innerHTML = '<option value="" disabled selected>Selecione...</option>';
            cities.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.nome;
                opt.innerText = c.nome;
                citySelect.appendChild(opt);
            });
            // Update label styling in case it was pre-filled
            citySelect.dispatchEvent(new Event('change'));
        } catch (e) {
            console.error("Error loading cities", e);
            citySelect.innerHTML = '<option value="" disabled selected>Erro ao carregar</option>';
        }
    }

    document.getElementById('state').addEventListener('change', (e) => {
        loadCities(e.target.value);
    });

    // AUTO-CEP FETCH
    document.getElementById('municipio').addEventListener('change', async (e) => {
        const city = e.target.value;
        const state = document.getElementById('state').value;
        const cepInput = document.getElementById('cep');
        
        // Only auto-fetch if CEP is empty
        if(state && city && cepInput.value.length === 0) {
            const loading = document.getElementById('address-loading');
            loading.innerText = 'Buscando CEP da região...';
            loading.style.display = 'block';
            try {
                const response = await fetch(`https://viacep.com.br/ws/${state}/${city}/Centro/json/`);
                const data = await response.json();
                
                if(data && data.length > 0) {
                    const genericCep = data[0].cep;
                    cepInput.value = maskCEP(genericCep);
                    
                    // Ensure label floats up
                    cepInput.focus();
                    cepInput.blur();
                    
                    lockAddressFields();
                }
            } catch (err) {
                console.error("Auto CEP fetch failed", err);
            } finally {
                loading.style.display = 'none';
                loading.innerHTML = 'Buscando endereço... <span class="material-icons spin" style="font-size: 14px;">autorenew</span>';
            }
        }
    });

    document.addEventListener('DOMContentLoaded', () => {
        loadStates();

        // Select label animation helper (only for real selects, not ubs_search)
        document.querySelectorAll('.md-text-field select').forEach(select => {
            const updateLabel = () => {
                if (select.value) select.classList.add('has-value');
                else select.classList.remove('has-value');
            };
            select.addEventListener('change', updateLabel);
            select.addEventListener('blur', updateLabel);
            updateLabel();
        });

        // UBS autocomplete event listeners
        const ubsSearch = document.getElementById('ubs_search');
        if (ubsSearch) {
            ubsSearch.addEventListener('input', (e) => {
                const q = e.target.value.trim();
                const filtered = q
                    ? _ubsList.filter(u => u.toLowerCase().includes(q.toLowerCase()))
                    : _ubsList;
                if (_ubsList.length) _renderSuggestions(filtered);
            });

            ubsSearch.addEventListener('focus', () => {
                if (_ubsList.length) _renderSuggestions(_ubsList);
            });

            ubsSearch.addEventListener('blur', () => {
                // Small delay so mousedown on suggestion fires first
                setTimeout(() => {
                    document.getElementById('ubs-suggestions').style.display = 'none';
                }, 150);
            });

            ubsSearch.addEventListener('keydown', (e) => {
                const sugg  = document.getElementById('ubs-suggestions');
                const items = sugg.querySelectorAll('.ubs-suggestion-item');
                if (!items.length) return;

                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    _ubsActiveIndex = Math.min(_ubsActiveIndex + 1, items.length - 1);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    _ubsActiveIndex = Math.max(_ubsActiveIndex - 1, 0);
                } else if (e.key === 'Enter' && _ubsActiveIndex >= 0) {
                    e.preventDefault();
                    _selectUbs(items[_ubsActiveIndex].dataset.val);
                    return;
                } else if (e.key === 'Escape') {
                    sugg.style.display = 'none';
                    return;
                }
                items.forEach((it, i) => it.classList.toggle('active', i === _ubsActiveIndex));
                if (_ubsActiveIndex >= 0) items[_ubsActiveIndex].scrollIntoView({ block: 'nearest' });
            });
        }

        // Close suggestions when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.ubs-autocomplete-wrapper')) {
                const sugg = document.getElementById('ubs-suggestions');
                if (sugg) sugg.style.display = 'none';
            }
        });
    });
</script>
{% endblock %}
