<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TCC Health{% endblock %}</title>
    
    <!-- Google Fonts: Roboto & Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

    <!-- Custom MD3 CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/md3.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="md-banner">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

    <!-- Accessibility Toggle -->
    <button class="accessibility-toggle" id="accessibilityToggle" onclick="AccessibilityService.toggle()" aria-label="Ativar leitura de tela guiada" title="Ativar leitura de tela">
        <span class="material-icons-outlined">volume_off</span>
    </button>

    <script src="{{ url_for('static', filename='js/accessibility.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
