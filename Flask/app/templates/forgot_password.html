{% extends "base.html" %}

{% block title %}Recuperar Senha{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/forgot_password.css') }}">
{% endblock %}

{% block content %}
<div class="auth-page-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="material-icons-outlined">lock_reset</span>
            <h2 class="headline-large">Esqueci a Senha</h2>
            <p class="body-large">Informe o e-mail cadastrado. Enviaremos um link para você criar uma nova senha.</p>
        </div>

        <form action="{{ url_for('login.forgot_password') }}" method="POST" class="auth-form">
            <div class="md-text-field" style="margin-bottom: 24px;">
                <input type="email" name="email" id="email" placeholder=" " required style="font-size: 1.1rem; padding: 16px;">
                <label for="email" style="font-size: 1.1rem;">Seu E-mail</label>
            </div>

            <button type="submit" class="md-button filled" style="width: 100%; height: 56px; font-size: 1.2rem; margin-bottom: 16px;">
                Enviar Link de Recuperação
            </button>
            
            <a href="{{ url_for('login.login') }}" class="md-button outlined" style="width: 100%; height: 56px; font-size: 1.1rem; text-decoration: none; display: flex; align-items: center; justify-content: center;">
                Voltar para o Login
            </a>
        </form>
    </div>
</div>
{% endblock %}
