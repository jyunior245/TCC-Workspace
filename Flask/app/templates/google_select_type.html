{% extends "base.html" %}

{% block title %}Selecionar Tipo de Conta - TCC Health{% endblock %}

{% block content %}
<div class="md-container" style="max-width: 400px; margin: 100px auto;">
    <div class="md-card">
        <h2 class="md-headline-large">Bem-vindo!</h2>
        <p class="md-body-medium">Vimos que esta é sua primeira vez aqui com o Google. Como você deseja usar a plataforma?</p>
        
        <form method="POST">
            <div class="md-field-group">
                <label class="md-label">Eu sou um:</label>
                <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 10px;">
                    <label class="md-radio-item" style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="radio" name="user_type" value="patient" required>
                        <span>Paciente / Usuário de Saúde</span>
                    </label>
                    <label class="md-radio-item" style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="radio" name="user_type" value="health_agent" required>
                        <span>Agente de Saúde (ACS)</span>
                    </label>
                </div>
            </div>

            <div class="md-actions" style="margin-top: 24px;">
                <button type="submit" class="md-btn md-btn-primary" style="width: 100%;">
                    Continuar Cadastro
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
